<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>入力画面</title>

    <style>
        html,
        body {
            overflow: hidden;
        }

        body {
            font-family: "Yu Gothic Medium", "Yu Gothic", sans-serif;
            background-color: #f0f0f0;
            margin: 0;
        }


        .container {
            width: 100dvw;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

        }

        .center {
            width: 24vw;
            height: 24vw;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            overflow: hidden;
        }

        .center img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .message {
            text-align: center;
            color: #333;
        }

        #inputText {
            width: 30vw;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 48px;
        }
    </style>
</head>

<body>
    <div class="container" id="container">
        <input type="text" id="inputText" placeholder="題名を入力してください">
        <div class="center">
            <img src="../sample.png" alt="表情素材">
        </div>
        <div class="message">
            <h1>この表情に、題名をつけてください。<br> ただし、「嬉しい」「悲しい」などの感情を表す言葉は使わないでください。</h1>
        </div>
        
    </div>
</body>

</html>
