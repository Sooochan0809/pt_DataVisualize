<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Demo</title>
    <script defer src="../faceAPI/face-api.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: grid;
            place-items: center;
            background-color: #f0f0f0;
            color: #f4f7fb;
            font-family: "Yu Gothic Medium", "Yu Gothic", sans-serif;
        }

        video {
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera {
            position: relative;
            width: min(100vw, 75vh);
            height: min(100vh, 133.333vw);
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        .panel {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            width: min(240px, calc(100% - 16px));
            padding: 16px;
            border-radius: 8px;
            background: rgba(27, 32, 38, 0.88);
        }

        .bar-row {
            display: grid;
            grid-template-columns: 56px 1fr 24px;
            gap: 8px;
            align-items: center;
            margin: 8px 0;
            font-size: 11px;
        }

        .bar-row span:last-child {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .bar {
            height: 7px;
            border-radius: 999px;
            overflow: hidden;
            background: #101419;
        }

        .fill {
            display: block;
            width: 0%;
            height: 100%;
            background: #42d392;
            transition: width 120ms linear;
        }

        @media (max-width: 800px) {
            .panel {
                right: 8px;
                bottom: 8px;
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <main class="camera">
        <video id="video" autoplay muted playsinline></video>
        <aside class="panel">
            <span id="status">モデル読み込み中...</span>
            <div id="bars"></div>
        </aside>
    </main>

    <script>
        window.addEventListener("load", () => {
            const MODEL_URL = "../faceAPI/models";

            const video = document.getElementById("video");
            const status = document.getElementById("status");
            const bars = document.getElementById("bars");

            let running = false;
            let cameraSize = "";

            function updateExpressions(expressions = {}) {
                bars.innerHTML = Object.entries(expressions).map(([name, score]) => {
                    const value = Math.min(1, Math.max(0, Number(score || 0)));

                    return `
                        <div class="bar-row">
                            <span>${name}</span>
                            <span class="bar"><span class="fill" style="width: ${value * 100}%"></span></span>
                            <span>${value.toFixed(1)}</span>
                        </div>
                    `;
                }).join("");
            }

            async function detect() {
                if (!running) {
                    return;
                }

                try {
                    const detections = await faceapi
                        .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceExpressions();

                    updateExpressions(detections[0]?.expressions);

                    const state = detections.length ? "検出中" : "顔が見つかりません";
                    status.textContent = cameraSize ? `${cameraSize} / ${state}` : state;
                } catch (error) {
                    status.textContent = `推定エラー: ${error.message}`;
                }

                requestAnimationFrame(detect);
            }

            async function startCamera() {
                status.textContent = "カメラ起動中...";

                try {
                    video.srcObject = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 4096 },
                            height: { ideal: 2160 },
                            frameRate: { ideal: 60 }
                        },
                        audio: false
                    });
                    await video.play();
                    running = true;
                    const track = video.srcObject.getVideoTracks()[0];
                    const settings = track.getSettings();
                    cameraSize = `${settings.width}x${settings.height}`;
                    status.textContent = cameraSize;
                    detect();
                } catch (error) {
                    status.textContent = `カメラを開始できません: ${error.message}`;
                }
            }

            async function loadModels() {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
                ]);

                startCamera();
            }

            loadModels().catch((error) => {
                status.textContent = `モデルを読み込めません: ${error.message}`;
            });
        });
    </script>
</body>

</html>
