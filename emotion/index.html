<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion</title>
    <script defer src="../faceAPI/face-api.min.js"></script>
    <style>
        :root {
            --panel-bg: rgba(27, 32, 38, 0.88);
            --accent: #42d392;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            background: #f0f0f0;
            color: #f4f7fb;
            font-family: "Yu Gothic Medium", "Yu Gothic", sans-serif;
        }

        main {
            position: relative;
            width: min(100vw, 75vh);
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        video,
        img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        video[hidden],
        img[hidden] {
            display: none;
        }

        main.file-source video,
        main.file-source img {
            object-fit: contain;
        }

        .visualize {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: #f0f0f07d;
        }

        .visualize[hidden] {
            display: none;
        }

        .radar {
            width: min(80vmin, 640px);
            height: min(80vmin, 640px);
            overflow: visible;
        }

        .radar-grid,
        .radar-axis {
            fill: none;
            stroke: rgba(27, 32, 38, 0.42);
            stroke-width: 1;
        }

        .radar-shape {
            fill: rgba(66, 211, 146, 0.34);
            stroke: var(--accent);
            stroke-width: 2;
            transition: points 120ms linear;
        }

        .radar-label {
            fill: #1b2026;
            font-size: 10px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .panel,
        .layer-controls {
            padding: 12px;
            border-radius: 8px;
            background: var(--panel-bg);
        }

        .panel {
            position: absolute;
            right: 1rem;
            bottom: 1rem;
            width: min(240px, calc(100% - 2rem));
        }

        .layer-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 999;
            display: grid;
            gap: 8px;
        }

        .source-controls {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 999;
            display: grid;
            gap: 8px;
        }

        .source-controls button,
        .source-controls label {
            padding: 8px 10px;
            border: 0;
            border-radius: 8px;
            background: var(--panel-bg);
            color: #f4f7fb;
            font: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        .source-controls input {
            position: absolute;
            inline-size: 1px;
            block-size: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .layer-controls label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            accent-color: var(--accent);
        }

        .bar-row {
            display: grid;
            grid-template-columns: 56px 1fr 24px;
            gap: 8px;
            align-items: center;
            margin: 8px 0;
            font-size: 11px;
        }

        .bar-row span:last-child {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .bar {
            height: 7px;
            overflow: hidden;
            border-radius: 999px;
            background: #101419;
        }

        .fill {
            display: block;
            height: 100%;
            background: var(--accent);
            transition: width 120ms linear;
        }

        @media (max-width: 800px) {
            .panel {
                right: 8px;
                bottom: 8px;
                width: min(240px, calc(100% - 16px));
            }

            .layer-controls {
                top: 8px;
                right: 8px;
            }

            .source-controls {
                top: 8px;
                left: 8px;
                max-width: calc(100% - 112px);
            }
        }
    </style>
</head>

<body>
    <section id="visualize_01" class="visualize" hidden>
        <svg id="radarChart" class="radar" viewBox="0 0 200 200" aria-label="emotion radar chart">
            <g id="radarGrid"></g>
            <g id="radarAxes"></g>
            <polygon id="radarShape" class="radar-shape" points=""></polygon>
            <g id="radarLabels"></g>
        </svg>
    </section>
    <section id="visualize_02" class="visualize" hidden></section>
    <section id="visualize_03" class="visualize" hidden></section>

    <main>
        <video id="video" autoplay muted playsinline></video>
        <img id="image" alt="インポートした画像" hidden>
        <div class="source-controls">
            <button id="cameraButton" type="button">WebCam</button>
            <label for="fileInput">ファイルから
                <input id="fileInput" type="file" accept="image/*,video/*">
            </label>
        </div>
        <div id="layerControls" class="layer-controls"></div>
        <aside class="panel">
            <span id="status">モデル読み込み中...</span>
            <div id="bars"></div>
        </aside>
    </main>

    <script>
        window.addEventListener("load", () => {
            const MODEL_URL = "../faceAPI/models";
            const MAX_CAMERA_SIZE = 4096;
            const DETECTION_OPTIONS = new faceapi.TinyFaceDetectorOptions();
            const RADAR_AXES = ["happy", "surprised", "fearful", "sad", "disgusted", "angry"];
            const RADAR_CENTER = 100;
            const RADAR_RADIUS = 72;
            const SOURCE_LABELS = {
                camera: "カメラ",
                "image-file": "画像ファイル",
                "video-file": "動画ファイル"
            };

            const stage = document.querySelector("main");
            const video = document.getElementById("video");
            const image = document.getElementById("image");
            const status = document.getElementById("status");
            const bars = document.getElementById("bars");
            const panel = document.querySelector(".panel");
            const cameraButton = document.getElementById("cameraButton");
            const fileInput = document.getElementById("fileInput");
            const layerControls = document.getElementById("layerControls");
            const radarAxes = document.getElementById("radarAxes");
            const radarGrid = document.getElementById("radarGrid");
            const radarLabels = document.getElementById("radarLabels");
            const radarShape = document.getElementById("radarShape");
            const visualizeSections = [...document.querySelectorAll('section[id^="visualize_"]')];

            let running = false;
            let mediaSize = "";
            let activeMedia = video;
            let activeMode = "camera";
            let activeObjectUrl = "";
            let detectToken = 0;

            function clampScore(score) {
                return Math.min(1, Math.max(0, Number(score || 0)));
            }

            function radarPoint(index, radius) {
                const angle = -Math.PI / 2 + (Math.PI * 2 * index) / RADAR_AXES.length;

                return {
                    x: RADAR_CENTER + Math.cos(angle) * radius,
                    y: RADAR_CENTER + Math.sin(angle) * radius
                };
            }

            function polygonPoints(radius) {
                return RADAR_AXES.map((_, index) => {
                    const point = radarPoint(index, radius);
                    return `${point.x},${point.y}`;
                }).join(" ");
            }

            function setupRadarChart() {
                radarGrid.innerHTML = [0.25, 0.5, 0.75, 1].map((scale) => `
                    <polygon class="radar-grid" points="${polygonPoints(RADAR_RADIUS * scale)}"></polygon>
                `).join("");

                radarAxes.innerHTML = RADAR_AXES.map((_, index) => {
                    const point = radarPoint(index, RADAR_RADIUS);
                    return `<line class="radar-axis" x1="${RADAR_CENTER}" y1="${RADAR_CENTER}" x2="${point.x}" y2="${point.y}"></line>`;
                }).join("");

                radarLabels.innerHTML = RADAR_AXES.map((name, index) => {
                    const point = radarPoint(index, RADAR_RADIUS + 18);
                    return `<text class="radar-label" x="${point.x}" y="${point.y}">${name}</text>`;
                }).join("");

                updateRadarChart();
            }

            function updateRadarChart(expressions = {}) {
                radarShape.setAttribute("points", RADAR_AXES.map((name, index) => {
                    const point = radarPoint(index, RADAR_RADIUS * clampScore(expressions[name]));
                    return `${point.x},${point.y}`;
                }).join(" "));
            }

            function updatePanelVisibility() {
                const hasVisibleLayer = [...layerControls.querySelectorAll("input")]
                    .some((checkbox) => checkbox.checked);

                panel.hidden = hasVisibleLayer;
            }

            function setupLayerControls() {
                visualizeSections.forEach((section) => {
                    const layer = Number(section.id.replace("visualize_", ""));
                    section.style.zIndex = String(10 + layer);
                    section.hidden = true;
                });

                layerControls.innerHTML = visualizeSections.map((section) => `
                    <label>
                        <input type="checkbox" data-target="${section.id}">
                        <span>${section.id}</span>
                    </label>
                `).join("");

                layerControls.addEventListener("change", (event) => {
                    const input = event.target;

                    if (input instanceof HTMLInputElement) {
                        const target = document.getElementById(input.dataset.target);
                        if (target) {
                            target.hidden = !input.checked;
                        }

                        updatePanelVisibility();
                    }
                });

                updatePanelVisibility();
            }

            function updateExpressions(expressions = {}) {
                bars.innerHTML = Object.entries(expressions).map(([name, score]) => {
                    const value = clampScore(score);

                    return `
                        <div class="bar-row">
                            <span>${name}</span>
                            <span class="bar"><span class="fill" style="width: ${value * 100}%"></span></span>
                            <span>${value.toFixed(1)}</span>
                        </div>
                    `;
                }).join("");

                updateRadarChart(expressions);
            }

            function stopCameraStream() {
                const stream = video.srcObject instanceof MediaStream ? video.srcObject : null;

                if (stream) {
                    stream.getTracks().forEach((track) => track.stop());
                    video.srcObject = null;
                }
            }

            function clearImportedFile() {
                if (activeObjectUrl) {
                    URL.revokeObjectURL(activeObjectUrl);
                    activeObjectUrl = "";
                }

                image.removeAttribute("src");
                video.removeAttribute("src");
                video.load();
                fileInput.value = "";
            }

            function stopDetection() {
                running = false;
                detectToken += 1;
            }

            function setActiveMedia(media, mode, sizeText = "") {
                activeMedia = media;
                activeMode = mode;
                mediaSize = sizeText;
                stage.classList.toggle("file-source", mode !== "camera");
                image.hidden = media !== image;
                video.hidden = media !== video;
                video.controls = mode === "video-file";
                video.loop = mode === "video-file";
            }

            function formatMediaSize(media) {
                const width = media.videoWidth || media.naturalWidth || media.width;
                const height = media.videoHeight || media.naturalHeight || media.height;

                return width && height ? `${width}x${height}` : "";
            }

            function updateStatus(message) {
                status.textContent = message;
            }

            function formatStatus(...parts) {
                return parts.filter(Boolean).join(" / ");
            }

            function showDetectionError(error) {
                updateStatus(`推定エラー: ${error.message}`);
            }

            function updateDetectionStatus(detections) {
                const state = detections.length ? "検出中" : "顔が見つかりません";
                updateStatus(formatStatus(SOURCE_LABELS[activeMode], mediaSize, state));
            }

            async function runDetection() {
                const detections = await faceapi
                    .detectAllFaces(activeMedia, DETECTION_OPTIONS)
                    .withFaceExpressions();

                updateExpressions(detections[0]?.expressions);
                updateDetectionStatus(detections);
            }

            async function detect(token = detectToken) {
                if (!running) {
                    return;
                }

                try {
                    await runDetection();
                } catch (error) {
                    showDetectionError(error);
                }

                if (running && token === detectToken) {
                    requestAnimationFrame(() => detect(token));
                }
            }

            async function detectOnce() {
                stopDetection();
                try {
                    await runDetection();
                } catch (error) {
                    showDetectionError(error);
                }
            }

            async function startCamera() {
                updateStatus("カメラ起動中...");
                stopDetection();
                stopCameraStream();
                clearImportedFile();

                try {
                    video.srcObject = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: MAX_CAMERA_SIZE },
                            height: { ideal: MAX_CAMERA_SIZE },
                            frameRate: { ideal: 60 }
                        },
                        audio: false
                    });

                    await video.play();

                    const settings = video.srcObject.getVideoTracks()[0].getSettings();
                    setActiveMedia(video, "camera", `${settings.width}x${settings.height}`);
                    updateStatus(formatStatus(SOURCE_LABELS.camera, mediaSize));
                    running = true;
                    detect();
                } catch (error) {
                    updateStatus(`カメラを開始できません: ${error.message}`);
                }
            }

            function waitForMediaLoad(media, eventName) {
                return new Promise((resolve, reject) => {
                    const cleanup = () => {
                        media.removeEventListener(eventName, handleLoad);
                        media.removeEventListener("error", handleError);
                    };
                    const handleLoad = () => {
                        cleanup();
                        resolve();
                    };
                    const handleError = () => {
                        cleanup();
                        reject(new Error("ファイルを読み込めません"));
                    };

                    media.addEventListener(eventName, handleLoad, { once: true });
                    media.addEventListener("error", handleError, { once: true });
                });
            }

            function loadFileMedia(media, source, eventName) {
                const loaded = waitForMediaLoad(media, eventName);
                media.src = source;
                media.load?.();
                return loaded;
            }

            async function startVideoFile() {
                try {
                    running = true;
                    await video.play();
                    detect();
                } catch (error) {
                    stopDetection();
                    updateStatus("動画を再生すると検出を開始します");
                }
            }

            async function importFile(file) {
                if (!file) {
                    return;
                }

                stopDetection();
                stopCameraStream();
                clearImportedFile();
                activeObjectUrl = URL.createObjectURL(file);

                if (file.type.startsWith("image/")) {
                    updateStatus("画像ファイル読み込み中...");
                    await loadFileMedia(image, activeObjectUrl, "load");
                    setActiveMedia(image, "image-file", formatMediaSize(image));
                    await detectOnce();
                    return;
                }

                if (file.type.startsWith("video/")) {
                    updateStatus("動画ファイル読み込み中...");
                    await loadFileMedia(video, activeObjectUrl, "loadedmetadata");
                    setActiveMedia(video, "video-file", formatMediaSize(video));
                    await startVideoFile();
                    return;
                }

                clearImportedFile();
                updateStatus("画像または動画ファイルを選択してください");
            }

            async function loadModels() {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
                ]);

                startCamera();
            }

            cameraButton.addEventListener("click", startCamera);
            fileInput.addEventListener("change", (event) => {
                importFile(event.target.files[0]).catch((error) => {
                    updateStatus(`ファイルを読み込めません: ${error.message}`);
                });
            });
            video.addEventListener("play", () => {
                if (activeMode === "video-file" && !running) {
                    running = true;
                    detectToken += 1;
                    detect();
                }
            });
            video.addEventListener("pause", () => {
                if (activeMode === "video-file") {
                    stopDetection();
                }
            });

            setupLayerControls();
            setupRadarChart();
            loadModels().catch((error) => {
                updateStatus(`モデルを読み込めません: ${error.message}`);
            });
        });
    </script>
</body>

</html>
